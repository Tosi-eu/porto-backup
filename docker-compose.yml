services:
  postgres:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    image: postgres:18
    container_name: postgres
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-estoque}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - abrigo
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres_init_test_db:
    image: postgres:18
    container_name: postgres_init_test_db
    env_file:
      - ../.env
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      TEST_DB_NAME: ${TEST_DB_NAME:-estoque_test}
    command: >
      sh -c "
      until pg_isready -h postgres -U $$PGUSER; do sleep 1; done;
      createdb -h postgres -U $$PGUSER $$TEST_DB_NAME 2>/dev/null || true;
      echo 'Banco de testes $$TEST_DB_NAME garantido.';
      exit 0
      "
    depends_on:
      postgres:
        condition: service_started
    networks:
      - abrigo
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - abrigo
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    # Carrega a raiz e o backend: variáveis como PRICING_API_* costumam estar só em
    # backend/.env; sem o segundo ficheiro o serviço de preços fica desligado no container.
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRICING_API_URL: ${PRICING_API_URL:-http://price-search:3010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      postgres_init_test_db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - abrigo
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://127.0.0.1:3000/api/v1/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  price-search:
    build:
      context: ../stokio-api-price-search
      dockerfile: Dockerfile
    container_name: price-search
    restart: always
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:3000}
      ENABLE_CRON: ${ENABLE_CRON:-true}
      ENABLE_PRICE_BACKFILL_CRON: ${ENABLE_PRICE_BACKFILL_CRON:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - abrigo
    expose:
      - "3010"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-${VITE_API_BASE_URL:-http://localhost/api/v1}}
        NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-${VITE_LOGO_URL:-/default_logo.png}}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-${VITE_PUBLIC_APP_NAME:-}}
        NEXT_PUBLIC_APP_LOGO_URL: ${NEXT_PUBLIC_APP_LOGO_URL:-${VITE_PUBLIC_APP_LOGO_URL:-}}
        NEXT_PUBLIC_R2_PUBLIC_BASE_URL: ${NEXT_PUBLIC_R2_PUBLIC_BASE_URL:-${VITE_R2_PUBLIC_BASE_URL:-${R2_PUBLIC_BASE_URL:-}}}
        NEXT_PUBLIC_X_API_KEY: ${NEXT_PUBLIC_X_API_KEY:-}
    container_name: frontend
    restart: always
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "8081"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - abrigo
    expose:
      - "8081"
    depends_on:
      - backend
      - price-search

  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./proxy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - abrigo

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: postgres_backup
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-estoque}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_RETENTION_COUNT: ${R2_RETENTION_COUNT:-168}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abrigo

volumes:
  postgres_data:

networks:
  abrigo:
    driver: bridge
