# =============================================================================
# Snippet para /etc/ssh/sshd_config – SSH somente com chave pública
# Copie as linhas abaixo para o seu sshd_config ou use configure-key-only.sh
# =============================================================================

# Autenticação por chave pública
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys

# Desativar login por senha
PasswordAuthentication no
PermitEmptyPasswords no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
# UsePAM no   # Descomente apenas se necessário; em alguns sistemas PAM é usado para outras coisas

# Root: só por chave (use "no" se não usar SSH como root)
PermitRootLogin prohibit-password

# Opcional: restringir algoritmos (recomendado)
PubkeyAcceptedAlgorithms +ssh-rsa,ssh-ed25519
HostkeyAlgorithms +ssh-ed25519,rsa-sha2-256,rsa-sha2-512
